[tools]
rust = "latest"

[tasks.setup]
description = "Install development dependencies (nextest, cargo-watch)"
run = """
cargo install cargo-nextest --locked && \
cargo install cargo-watch --locked
"""

[tasks.verify]
description = "Run linter, formatter check, and tests"
depends = ["setup"]
run = """
cargo clippy --all-targets -- -D warnings && \
cargo fmt --check && \
cargo nextest run
"""

[tasks.watch]
description = "Watch files and run nextest on changes"
depends = ["setup"]
run = "cargo watch -x 'nextest run'"

[tasks.clean]
description = "Clean build artifacts"
run = "cargo clean"

[tasks.install]
description = "Build and install the binary to ~/.cargo/bin"
run = "cargo install --path . --force"
