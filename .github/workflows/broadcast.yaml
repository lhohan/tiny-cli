name: Broadcast Model Updates

on:
  workflow_run:
    workflows: ['Detect Model Updates']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: models-watch
  cancel-in-progress: false

defaults:
  run:
    working-directory: models-watch

jobs:
  broadcast:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Broadcast model changes
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          BLUESKY_PDS: ${{ secrets.BLUESKY_PDS }}
        run: |
          ./models-broadcast.sh || exit_code=$?
          if [ "${exit_code:-0}" -eq 3 ]; then
            echo "No unledgered deltas to process — exiting cleanly."
            exit 0
          fi
          exit "${exit_code:-0}"

      - name: Commit and push ledger
        working-directory: .
        run: |
          if ! git diff --quiet -- models-watch/state/posted.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add models-watch/state/posted.json
            git commit -m "chore(models-watch): update posted ledger [skip ci]"
            git push
          fi
