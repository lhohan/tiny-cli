name: Detect Model Updates

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: models-watch
  cancel-in-progress: false

defaults:
  run:
    working-directory: models-watch

jobs:
  detect:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    env:
      MODELS_WATCH_NO_OSASCRIPT: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Detect model changes
        run: ./models-watch.sh

      - name: Commit and push state changes
        working-directory: .
        run: |
          if ! git diff --quiet -- models-watch/state/latest.json models-watch/state/change-*.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add models-watch/state/latest.json models-watch/state/change-*.json
            git commit -m "chore(models-watch): update model state [skip ci]"
            git push
          fi
